<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bluetooth LED - V3</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111827;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 25px;
      text-align: center;
    }
    .version {
      background: #facc15;
      color: #111827;
      padding: 8px 18px;
      border-radius: 999px;
      font-weight: bold;
    }
    button {
      font-size: 26px;
      padding: 24px 32px;
      border: none;
      border-radius: 20px;
      color: white;
      font-weight: bold;
    }
    #connect { background: #2563eb; }
    #on { background: #16a34a; }
    #off { background: #dc2626; }
    .buttons { display: flex; gap: 20px; }
    #status {
      font-size: 17px;
      color: #93c5fd;
      max-width: 90%;
      word-break: break-word;
    }
  </style>
</head>
<body>

  <div class="version">VERSION V3 - TEST BLE HM-10</div>

  <h1>Test Bluetooth LED Grove</h1>

  <button id="connect">Connexion Bluetooth</button>

  <div id="status">Non connecté</div>

  <div class="buttons">
    <button id="on">ALLUMER</button>
    <button id="off">ÉTEINDRE</button>
  </div>

  <script>
    let bluetoothCharacteristic;

    const SERVICE_UUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
    const CHARACTERISTIC_UUID = '0000ffe1-0000-1000-8000-00805f9b34fb';

    async function connectBluetooth() {
      try {
        statusText("V3 - Vérification Web Bluetooth...");

        if (!navigator.bluetooth) {
          statusText("ERREUR V3 : Web Bluetooth non disponible dans ce navigateur.");
          return;
        }

        statusText("V3 - Recherche BLE en cours...");

        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: [SERVICE_UUID]
        });

        statusText("V3 - Appareil choisi : " + (device.name || "sans nom"));

        const server = await device.gatt.connect();
        statusText("V3 - GATT connecté");

        const service = await server.getPrimaryService(SERVICE_UUID);
        statusText("V3 - Service FFE0 trouvé");

        bluetoothCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
        statusText("V3 - Connecté à FFE1 : prêt");
      } catch (error) {
        statusText("ERREUR V3 : " + error.name + " / " + error.message);
      }
    }

    async function sendCommand(command) {
      if (!bluetoothCharacteristic) {
        statusText("V3 - Bluetooth non connecté");
        return;
      }

      const data = new TextEncoder().encode(command);

      try {
        await bluetoothCharacteristic.writeValue(data);
        statusText("V3 - Commande envoyée : " + command);
      } catch (error1) {
        try {
          await bluetoothCharacteristic.writeValueWithoutResponse(data);
          statusText("V3 - Commande envoyée sans réponse : " + command);
        } catch (error2) {
          statusText("ERREUR V3 ENVOI : " + error2.name + " / " + error2.message);
        }
      }
    }

    function statusText(txt) {
      document.getElementById("status").textContent = txt;
      console.log(txt);
    }

    document.getElementById("connect").addEventListener("click", connectBluetooth);
    document.getElementById("on").addEventListener("click", () => sendCommand("A"));
    document.getElementById("off").addEventListener("click", () => sendCommand("E"));
  </script>

</body>
</html>
